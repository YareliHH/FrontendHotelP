<div class="p-6 space-y-8">

  <!-- ================= TITULO ================= -->
  <h1 class="text-2xl font-bold text-gray-800">
    Gestión de Mobiliario
  </h1>

  <!-- ================= FORMULARIO ================= -->
  <div class="bg-white rounded-2xl shadow-md p-8 max-w-5xl mx-auto">

    <h2 class="text-xl font-semibold text-gray-700 mb-6">
      Agregar Mobiliario
    </h2>

    <div class="grid md:grid-cols-2 gap-6">

      <!-- TIPO -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-2">
          Tipo <span class="text-red-500">*</span>
        </label>

        <input
          type="text"
          [(ngModel)]="nuevoTipo"
          placeholder="Sillas, Mesas, Manteles, etc."
          class="w-full bg-gray-100 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- CANTIDAD -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-2">
          Cantidad <span class="text-red-500">*</span>
        </label>

        <input
          type="number"
          [(ngModel)]="nuevoCantidad"
          placeholder="100"
          class="w-full bg-gray-100 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

    </div>

    <!-- BOTON -->
    <div class="flex justify-end mt-8">
      <button
        (click)="crearMobiliario()"
        [disabled]="!nuevoTipo || nuevoCantidad <= 0"
        class="px-5 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition disabled:bg-gray-400"
      >
        Agregar
      </button>
    </div>

  </div>

  <!-- ================= TABLA ================= -->
  <div class="bg-white rounded-2xl shadow-md p-6">

    <h3 class="text-lg font-semibold text-gray-700 mb-4">
      Lista de Mobiliario Registrado
    </h3>

    <div class="overflow-x-auto">

      <table class="w-full text-sm">

        <!-- HEADER -->
        <thead class="bg-gray-100 text-gray-600 uppercase text-xs">
          <tr>
            <th class="p-3 text-left">Tipo</th>
            <th class="p-3 text-left">Cantidad</th>
            <th class="p-3 text-center">Acciones</th>
          </tr>
        </thead>

        <!-- BODY -->
        <tbody>

          <tr
            *ngFor="let item of mobiliario"
            class="border-b hover:bg-gray-50 transition"
          >

            <!-- TIPO -->
            <td class="p-3 font-medium text-gray-800">
              {{ item.tipo }}
            </td>

            <!-- CANTIDAD -->
            <td class="p-3">

              <!-- NORMAL -->
              <div *ngIf="editandoId !== item.id">
                <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-md text-xs font-semibold">
                  {{ item.cantidad }}
                </span>
              </div>

              <!-- EDITANDO -->
              <div *ngIf="editandoId === item.id">
                <input
                  type="number"
                  [(ngModel)]="nuevaCantidad"
                  class="bg-gray-100 rounded-lg px-3 py-2 w-24 focus:outline-none focus:ring-2 focus:ring-blue-400"
                />
              </div>

            </td>

            <!-- ACCIONES -->
            <td class="p-3">

              <!-- BOTONES NORMALES -->
              <div *ngIf="editandoId !== item.id"
                   class="flex justify-center gap-2">

                <button
                  (click)="editar(item)"
                  class="bg-yellow-400 hover:bg-yellow-500 text-white px-3 py-1 rounded-lg text-xs"
                >
                  Editar
                </button>

                <button
                  (click)="eliminar(item.id)"
                  class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-xs"
                >
                  Eliminar
                </button>

              </div>

              <!-- BOTONES EDICION -->
              <div *ngIf="editandoId === item.id"
                   class="flex justify-center gap-2">

                <button
                  (click)="guardar(item.id)"
                  class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded-lg text-xs"
                >
                  Guardar
                </button>

                <button
                  (click)="cancelar()"
                  class="bg-gray-500 hover:bg-gray-600 text-white px-3 py-1 rounded-lg text-xs"
                >
                  Cancelar
                </button>

              </div>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
