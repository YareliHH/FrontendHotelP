<div class="p-6 space-y-8">

  <!-- TITULO -->
  <div class="flex items-center gap-2">
    <h2 class="text-2xl font-semibold text-gray-800">
      Inventario de Mobiliario
    </h2>
  </div>


  <!-- FORMULARIO -->
  <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6">

    <div class="flex items-center gap-2 mb-4">
      <i class="fa-solid fa-plus text-green-600"></i>
      <h3 class="text-lg font-semibold text-gray-700">
        Agregar mobiliario
      </h3>
    </div>

    <div class="flex flex-wrap items-center gap-4">

      <!-- INPUT TIPO -->
      <div class="flex flex-col">
        <label class="text-sm text-gray-600 mb-1">Tipo</label>

        <input
          type="text"
          [(ngModel)]="nuevoTipo"
          placeholder="Ej. Silla"
          class="border border-gray-300 rounded-lg px-3 py-2 w-60 focus:ring-2 focus:ring-green-500 outline-none"
        >
      </div>


      <!-- INPUT CANTIDAD -->
      <div class="flex flex-col">
        <label class="text-sm text-gray-600 mb-1">Cantidad</label>

        <input
          type="number"
          [(ngModel)]="nuevoCantidad"
          placeholder="0"
          class="border border-gray-300 rounded-lg px-3 py-2 w-32 focus:ring-2 focus:ring-green-500 outline-none"
        >
      </div>


      <!-- BOTON -->
      <div class="mt-5">
        <button
          (click)="crearMobiliario()"
          [disabled]="!nuevoTipo || nuevoCantidad <= 0"
          class="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white text-sm px-4 py-2 rounded-lg transition disabled:bg-gray-400"
        >
          <i class="fa-solid fa-plus"></i>
          Agregar
        </button>
      </div>

    </div>

  </div>


  <!-- TABLA -->
  <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">

    <table class="w-full text-sm">

      <!-- HEADER -->
      <thead class="bg-gray-100">
        <tr class="text-gray-700">
          <th class="p-4 text-left font-semibold">Tipo</th>
          <th class="p-4 text-left font-semibold">Cantidad</th>
          <th class="p-4 text-center font-semibold">Acciones</th>
        </tr>
      </thead>


      <!-- BODY -->
      <tbody>

        <tr
          *ngFor="let item of mobiliario"
          class="border-t hover:bg-gray-50 transition"
        >

          <!-- TIPO -->
          <td class="p-4 font-medium text-gray-700">
            {{ item.tipo }}
          </td>


          <!-- CANTIDAD -->
          <td class="p-4">

            <div *ngIf="editandoId !== item.id">
              <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-md text-xs font-medium">
                {{ item.cantidad }}
              </span>
            </div>

            <div *ngIf="editandoId === item.id">

              <input
                type="number"
                [(ngModel)]="nuevaCantidad"
                class="border border-gray-300 rounded-lg px-3 py-1.5 w-24 focus:ring-2 focus:ring-blue-500 outline-none"
              >

            </div>

          </td>


          <!-- ACCIONES -->
          <td class="p-4 text-center">

            <!-- BOTONES NORMALES -->
            <div *ngIf="editandoId !== item.id" class="flex justify-center gap-2">

              <button
                (click)="editar(item)"
                class="flex items-center gap-1 bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-1.5 rounded-lg transition"
              >
                <i class="fa-solid fa-pen"></i>
                Editar
              </button>

              <button
                (click)="eliminar(item.id)"
                class="flex items-center gap-1 bg-red-600 hover:bg-red-700 text-white text-xs px-3 py-1.5 rounded-lg transition"
              >
                <i class="fa-solid fa-trash"></i>
                Eliminar
              </button>

            </div>


            <!-- BOTONES EDICION -->
            <div *ngIf="editandoId === item.id" class="flex justify-center gap-2">

              <button
                (click)="guardar(item.id)"
                class="flex items-center gap-1 bg-green-600 hover:bg-green-700 text-white text-xs px-3 py-1.5 rounded-lg transition"
              >
                <i class="fa-solid fa-check"></i>
                Guardar
              </button>

              <button
                (click)="cancelar()"
                class="flex items-center gap-1 bg-gray-500 hover:bg-gray-600 text-white text-xs px-3 py-1.5 rounded-lg transition"
              >
                <i class="fa-solid fa-xmark"></i>
                Cancelar
              </button>

            </div>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
