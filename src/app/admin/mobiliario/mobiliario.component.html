<div class="p-6 space-y-8">

  <!-- TITULO -->
  <h1 class="text-2xl font-semibold text-gray-800">
    Gestión de Mobiliario
  </h1>


  <!-- ================================= -->
  <!-- FORMULARIO -->
  <!-- ================================= -->

  <div class="border rounded-xl shadow-sm">

    <div class="px-6 py-4 border-b">
      <h2 class="text-lg font-semibold text-gray-700">
        Agregar Mobiliario
      </h2>
    </div>

    <div class="p-6">

      <div class="grid md:grid-cols-2 gap-6">

        <!-- TIPO -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Tipo <span class="text-red-500">*</span>
          </label>

          <input
            type="text"
            [(ngModel)]="nuevoTipo"
            placeholder="Sillas, Mesas, Manteles, etc."
            class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
          />
        </div>


        <!-- CANTIDAD -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Cantidad <span class="text-red-500">*</span>
          </label>

          <input
            type="number"
            [(ngModel)]="nuevoCantidad"
            placeholder="100"
            class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
          />
        </div>

      </div>

      <!-- BOTON -->
      <div class="flex justify-end mt-6">

        <button
          (click)="crearMobiliario()"
          [disabled]="!nuevoTipo || nuevoCantidad <= 0"
          class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition disabled:bg-gray-400"
        >
          Agregar
        </button>

      </div>

    </div>

  </div>


  <!-- ================================= -->
  <!-- TABLA -->
  <!-- ================================= -->

  <div class="border rounded-xl shadow-sm">

    <div class="px-6 py-4 border-b">
      <h3 class="text-lg font-semibold text-gray-700">
        Lista de Mobiliario Registrado
      </h3>
    </div>

    <div class="p-6 overflow-x-auto">

      <table class="w-full text-sm">

        <thead class="bg-gray-100 text-gray-600 uppercase text-xs">
          <tr>
            <th class="p-3 text-left">Tipo</th>
            <th class="p-3 text-left">Cantidad</th>
            <th class="p-3 text-center">Acciones</th>
          </tr>
        </thead>

        <tbody>

          <tr
            *ngFor="let item of mobiliario"
            class="border-b hover:bg-gray-50"
          >

            <!-- TIPO -->
            <td class="p-3 font-medium text-gray-800">
              {{ item.tipo }}
            </td>


            <!-- CANTIDAD -->
            <td class="p-3">

              <!-- NORMAL -->
              <div *ngIf="editandoId !== item.id">

                <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-md text-xs font-semibold">
                  {{ item.cantidad }}
                </span>

              </div>

              <!-- EDITANDO -->
              <div *ngIf="editandoId === item.id">

                <input
                  type="number"
                  [(ngModel)]="nuevaCantidad"
                  class="border rounded-lg px-3 py-1 w-24 focus:ring-2 focus:ring-blue-500"
                />

              </div>

            </td>


            <!-- ACCIONES -->
            <td class="p-3">

              <!-- BOTONES NORMALES -->
              <div *ngIf="editandoId !== item.id"
                   class="flex justify-center gap-2">

                <!-- EDITAR -->
                <button
                  (click)="editar(item)"
                  class="bg-yellow-400 hover:bg-yellow-500 text-white p-1.5 rounded-md text-xs"
                >
                  <i class="fas fa-pen"></i>
                </button>

                <!-- ELIMINAR -->
                <button
                  (click)="eliminar(item.id)"
                  class="bg-red-500 hover:bg-red-600 text-white p-1.5 rounded-md text-xs"
                >
                  <i class="fas fa-trash"></i>
                </button>

              </div>


              <!-- BOTONES EDICION -->
              <div *ngIf="editandoId === item.id"
                   class="flex justify-center gap-2">

                <button
                  (click)="guardar(item.id)"
                  class="bg-green-600 hover:bg-green-700 text-white p-1.5 rounded-md text-xs"
                >
                  <i class="fas fa-check"></i>
                </button>

                <button
                  (click)="cancelar()"
                  class="bg-gray-500 hover:bg-gray-600 text-white p-1.5 rounded-md text-xs"
                >
                  <i class="fas fa-xmark"></i>
                </button>

              </div>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
