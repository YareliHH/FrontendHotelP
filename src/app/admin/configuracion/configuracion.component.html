<div class="space-y-8">

  <!-- TITULO -->
  <div class="flex items-center gap-3">
    <h1 class="text-2xl font-semibold text-gray-800">Configuración</h1>
  </div>

  <!-- GRID -->
  <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">

    <!-- PERFIL -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">

      <div class="flex items-center gap-2 mb-5">
        <i class="fa-solid fa-user text-blue-600"></i>
        <h2 class="text-base font-semibold text-gray-700">
          Perfil del Usuario
        </h2>
      </div>

      <div class="space-y-4">

        <!-- CORREO -->
        <div>
          <label class="text-sm text-gray-600">Correo</label>

          <div class="relative mt-1">
            <i class="fa-solid fa-envelope absolute left-3 top-3 text-gray-500 text-sm"></i>

            <input
              type="email"
              placeholder="correo@hotel.com"
              class="w-full pl-9 py-2.5 text-sm bg-slate-200 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            />
          </div>
        </div>

        <!-- CONTRASEÑA -->
        <div>
          <label class="text-sm text-gray-600">Contraseña Actual</label>

          <div class="relative mt-1">
            <i class="fa-solid fa-lock absolute left-3 top-3 text-gray-500 text-sm"></i>

            <input
              type="password"
              class="w-full pl-9 py-2.5 text-sm bg-slate-200 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            />
          </div>
        </div>

        <!-- BOTON -->
        <button
          class="flex items-center gap-2 text-sm bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition"
        >
          <i class="fa-solid fa-floppy-disk text-sm"></i>
          Guardar cambios
        </button>

      </div>

    </div>


    <!-- PREFERENCIAS -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">

      <div class="flex items-center gap-2 mb-5">
        <i class="fa-solid fa-sliders text-purple-600"></i>
        <h2 class="text-base font-semibold text-gray-700">
          Preferencias del Sistema
        </h2>
      </div>

      <div class="space-y-4">

        <!-- TEMA -->
        <div>
          <label class="text-sm text-gray-600">Tema</label>

          <div class="relative mt-1">
            <i class="fa-solid fa-palette absolute left-3 top-3 text-gray-500 text-sm"></i>

            <select
              class="w-full pl-9 py-2.5 text-sm bg-slate-200 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            >
              <option>Claro</option>
              <option>Oscuro</option>
            </select>
          </div>
        </div>

        <!-- IDIOMA -->
        <div>
          <label class="text-sm text-gray-600">Idioma</label>

          <div class="relative mt-1">
            <i class="fa-solid fa-language absolute left-3 top-3 text-gray-500 text-sm"></i>

            <select
              class="w-full pl-9 py-2.5 text-sm bg-slate-200 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            >
              <option>Español</option>
              <option>Inglés</option>
            </select>
          </div>
        </div>

      </div>

    </div>

  </div>

</div>
