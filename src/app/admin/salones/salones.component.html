<div class="p-6 space-y-8">

  <!-- TITULO -->
  <h1 class="text-2xl font-semibold text-gray-800">
    Gestión de Salones
  </h1>

  <!-- ================= FORMULARIO ================= -->

  <div class="border rounded-xl shadow-sm">

    <div class="px-6 py-4 border-b">
      <h2 class="text-lg font-semibold text-gray-700">
        {{ editMode ? 'Editar Salón' : 'Agregar Nuevo Salón' }}
      </h2>
    </div>

    <div class="p-6 space-y-6">

      <div class="grid md:grid-cols-2 gap-6">

        <!-- NOMBRE -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Nombre del Salón <span class="text-red-500">*</span>
          </label>

          <input
            type="text"
            [(ngModel)]="salonForm.nombre"
            placeholder="Gran Salón"
            class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
          />
        </div>

        <!-- CAPACIDAD -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Capacidad <span class="text-red-500">*</span>
          </label>

          <input
            type="number"
            [(ngModel)]="salonForm.capacidad"
            placeholder="500"
            class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
          />
        </div>

      </div>

      <!-- DESCRIPCIÓN -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Descripción <span class="text-red-500">*</span>
        </label>

        <textarea
          [(ngModel)]="salonForm.descripcion"
          rows="3"
          placeholder="Descripción del salón"
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        ></textarea>
      </div>

      <!-- BOTONES -->
      <div class="flex justify-end gap-3">

        <button
          (click)="resetForm()"
          class="px-4 py-2 rounded-lg bg-gray-500 text-white hover:bg-gray-600 transition"
        >
          Cancelar
        </button>

        <button
          (click)="guardar()"
          class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition"
        >
          Guardar
        </button>

      </div>

    </div>

  </div>

  <!-- ================= TABLA ================= -->

  <div class="border rounded-xl shadow-sm">

    <div class="px-6 py-4 border-b">
      <h3 class="text-lg font-semibold text-gray-700">
        Lista de Salones Registrados
      </h3>
    </div>

    <div class="p-6 overflow-x-auto">

      <table class="w-full text-sm">

        <thead class="bg-gray-100 text-gray-600 uppercase text-xs">
          <tr>
            <th class="p-3 text-left">Nombre</th>
            <th class="p-3 text-left">Capacidad</th>
            <th class="p-3 text-left">Descripción</th>
            <th class="p-3 text-center">Acciones</th>
          </tr>
        </thead>

        <tbody>

          <tr
            *ngFor="let salon of salones"
            class="border-b hover:bg-gray-50"
          >

            <td class="p-3 font-medium text-gray-800">
              {{ salon.nombre }}
            </td>

            <td class="p-3">
              {{ salon.capacidad }} personas
            </td>

            <td class="p-3 text-gray-600">
              {{ salon.descripcion }}
            </td>

            <!-- ACCIONES -->
            <td class="p-3">

              <div class="flex justify-center gap-2">

                <!-- EDITAR -->
                <button
                  (click)="editar(salon)"
                  class="bg-yellow-400 hover:bg-yellow-500 text-white p-1.5 rounded-md text-xs"
                >
                  <i class="fas fa-pen"></i>
                </button>

                <!-- ELIMINAR -->
                <button
                  (click)="eliminar(salon.id_salon!)"
                  class="bg-red-500 hover:bg-red-600 text-white p-1.5 rounded-md text-xs"
                >
                  <i class="fas fa-trash"></i>
                </button>

              </div>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
