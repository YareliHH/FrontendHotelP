<div class="p-6 space-y-8">

  <!-- ================= TITULO ================= -->
  <h1 class="text-2xl font-bold text-gray-800">
    Gestión de Salones
  </h1>

  <!-- ================= FORMULARIO ================= -->
  <div class="bg-white rounded-2xl shadow-md p-8 max-w-6xl mx-auto">

    <!-- SUBTITULO -->
    <h2 class="text-xl font-semibold text-gray-700 mb-6">
      {{ editMode ? 'Editar Salón' : 'Nuevo Salón' }}
    </h2>

    <!-- GRID -->
    <div class="grid md:grid-cols-2 gap-6">

      <!-- NOMBRE -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-2">
          Nombre del salón
        </label>
        <input
          type="text"
          [(ngModel)]="salonForm.nombre"
          placeholder="Gran Salón"
          class="w-full bg-gray-100 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- CAPACIDAD -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-2">
          Capacidad
        </label>
        <input
          type="number"
          [(ngModel)]="salonForm.capacidad"
          placeholder="500"
          class="w-full bg-gray-100 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- DESCRIPCIÓN -->
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-600 mb-2">
          Descripción
        </label>
        <textarea
          [(ngModel)]="salonForm.descripcion"
          rows="4"
          placeholder="Descripción del salón"
          class="w-full bg-gray-100 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
        ></textarea>
      </div>

    </div>

    <!-- BOTONES -->
    <div class="flex justify-end gap-4 mt-8">

      <button
        (click)="resetForm()"
        class="px-5 py-2 rounded-lg bg-gray-400 text-white hover:bg-gray-500 transition"
      >
        Cancelar
      </button>

      <button
        (click)="guardar()"
        class="px-5 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition"
      >
        {{ editMode ? 'Actualizar' : 'Guardar' }}
      </button>

    </div>

  </div>

  <!-- ================= TABLA ================= -->
  <div class="bg-white rounded-2xl shadow-md p-6">

    <!-- TITULO TABLA -->
    <h3 class="text-lg font-semibold text-gray-700 mb-4">
      Lista de Salones
    </h3>

    <!-- TABLA -->
    <div class="overflow-x-auto">
      <table class="w-full text-sm">

        <!-- HEADER -->
        <thead class="bg-gray-100 text-gray-600 uppercase text-xs rounded-lg">
          <tr>
            <th class="p-3 text-left">Nombre</th>
            <th class="p-3 text-left">Capacidad</th>
            <th class="p-3 text-left">Descripción</th>
            <th class="p-3 text-center">Acciones</th>
          </tr>
        </thead>

        <!-- BODY -->
        <tbody>
          <tr
            *ngFor="let salon of salones"
            class="border-b hover:bg-gray-50 transition"
          >

            <td class="p-3 font-medium text-gray-800">
              {{ salon.nombre }}
            </td>

            <td class="p-3 text-gray-600">
              {{ salon.capacidad }} personas
            </td>

            <td class="p-3 text-gray-500">
              {{ salon.descripcion }}
            </td>

            <!-- ACCIONES -->
            <td class="p-3">
              <div class="flex justify-center gap-2">

                <!-- EDITAR -->
                <button
                  (click)="editar(salon)"
                  class="bg-yellow-400 hover:bg-yellow-500 text-white px-3 py-1 rounded-lg text-xs"
                >
                  Editar
                </button>

                <!-- ELIMINAR -->
                <button
                  (click)="eliminar(salon.id_salon!)"
                  class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-xs"
                >
                  Eliminar
                </button>

              </div>
            </td>

          </tr>
        </tbody>

      </table>
    </div>

  </div>

</div>
