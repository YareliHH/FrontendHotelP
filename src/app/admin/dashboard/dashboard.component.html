<div class="space-y-6 max-w-7xl mx-auto">

  <!-- Encabezado -->
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-800">Dashboard</h1>
    <p class="text-gray-500 text-sm">Resumen general del sistema</p>
  </div>

  <!-- TARJETAS ESTADÍSTICAS -->
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5">

    <!-- Total Eventos -->
    <div class="p-4 rounded-xl shadow-md bg-gradient-to-r from-blue-500 to-blue-600 text-white flex justify-between items-center hover:scale-105 transition">
      <div>
        <p class="text-xs opacity-90">Total Eventos</p>
        <p class="text-2xl font-bold mt-1">{{ totalEventos }}</p>
      </div>
      <i class="fa-regular fa-calendar text-3xl opacity-90"></i>
    </div>

    <!-- Ingresos Estimados -->
    <div class="p-4 rounded-xl shadow-md bg-gradient-to-r from-green-500 to-green-600 text-white flex justify-between items-center hover:scale-105 transition">
      <div>
        <p class="text-xs opacity-90">Ingresos Estimados</p>
        <p class="text-2xl font-bold mt-1">{{ ingresosEstimados }}</p>
      </div>
      <i class="fa-solid fa-coins text-3xl opacity-90"></i>
    </div>

    <!-- Salones Totales -->
    <div class="p-4 rounded-xl shadow-md bg-gradient-to-r from-purple-500 to-purple-600 text-white flex justify-between items-center hover:scale-105 transition">
      <div>
        <p class="text-xs opacity-90">Salones Totales</p>
        <p class="text-2xl font-bold mt-1">{{ salonesDisponibles }}</p>
      </div>
      <i class="fa-solid fa-building text-3xl opacity-90"></i>
    </div>

    <!-- Eventos Registrados -->
    <div class="p-4 rounded-xl shadow-md bg-gradient-to-r from-orange-500 to-orange-600 text-white flex justify-between items-center hover:scale-105 transition">
      <div>
        <p class="text-xs opacity-90">Eventos Registrados</p>
        <p class="text-2xl font-bold mt-1">{{ totalEventos }}</p>
      </div>
      <i class="fa-solid fa-door-open text-3xl opacity-90"></i>
    </div>

  </div>

  <!-- SECCIÓN CALENDARIO -->
  <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100 space-y-5">

    <!-- Título -->
    <div class="flex justify-between items-center">
      <h2 class="text-lg font-semibold text-gray-700 flex items-center gap-2">
        <i class="fa-solid fa-calendar-days text-blue-600"></i>
        Calendario de Eventos
      </h2>
    </div>

    <!-- Calendario -->
    <div class="rounded-lg border p-3 bg-gray-50 shadow-inner">
      <app-calendar [eventos]="eventos"></app-calendar>
    </div>

  </div>

</div>
