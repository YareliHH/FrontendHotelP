<div class="flex h-screen">

  <!-- SIDEBAR -->
  <aside
    [ngClass]="isCollapsed ? 'w-20 p-4' : 'w-64 p-6'"
    class="bg-slate-900 text-white flex flex-col transition-all duration-300"
  >

    <!-- LOGO + FLECHA -->
    <div class="flex items-center justify-between mb-10">

      <!-- LOGO -->
      <div class="flex justify-center w-full">
        <img
          src="assets/img/Logoposada.png"
          alt="Hotel Posada"
          class="h-12 w-auto object-contain"
        />
      </div>

      <!-- BOTON FLECHA -->
      <button
        (click)="toggleSidebar()"
        class="text-white text-xl hover:text-orange-400 transition ml-2"
      >
        <i
          class="fa-solid"
          [ngClass]="isCollapsed ? 'fa-chevron-right' : 'fa-chevron-left'"
        ></i>
      </button>

    </div>

    <!-- MENU -->
    <nav class="flex-1 space-y-3">

      <!-- Dashboard -->
      <a
        routerLink="/admin/dashboard"
        routerLinkActive="bg-slate-700 text-white shadow"
        class="flex items-center rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all duration-200"
        [ngClass]="isCollapsed ? 'justify-center p-3' : 'gap-3 px-4 py-3'"
      >
        <i class="fa-solid fa-chart-line text-lg"></i>
        <span *ngIf="!isCollapsed">Dashboard</span>
      </a>

      <!-- Eventos -->
      <a
        routerLink="/admin/eventos"
        routerLinkActive="bg-slate-700 text-white shadow"
        class="flex items-center rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all duration-200"
        [ngClass]="isCollapsed ? 'justify-center p-3' : 'gap-3 px-4 py-3'"
      >
        <i class="fa-solid fa-calendar-days text-lg"></i>
        <span *ngIf="!isCollapsed">Eventos</span>
      </a>

      <!-- Salones -->
      <a
        routerLink="/admin/salones"
        routerLinkActive="bg-slate-700 text-white shadow"
        class="flex items-center rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all duration-200"
        [ngClass]="isCollapsed ? 'justify-center p-3' : 'gap-3 px-4 py-3'"
      >
        <i class="fa-solid fa-building text-lg"></i>
        <span *ngIf="!isCollapsed">Salones</span>
      </a>

      <!-- Servicios -->
      <a
        routerLink="/admin/servicios"
        routerLinkActive="bg-slate-700 text-white shadow"
        class="flex items-center rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all duration-200"
        [ngClass]="isCollapsed ? 'justify-center p-3' : 'gap-3 px-4 py-3'"
      >
        <i class="fa-solid fa-bell-concierge text-lg"></i>
        <span *ngIf="!isCollapsed">Servicios</span>
      </a>

      <!-- Mobiliario -->
      <a
        routerLink="/admin/mobiliario"
        routerLinkActive="bg-slate-700 text-white shadow"
        class="flex items-center rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all duration-200"
        [ngClass]="isCollapsed ? 'justify-center p-3' : 'gap-3 px-4 py-3'"
      >
        <i class="fa-solid fa-couch text-lg"></i>
        <span *ngIf="!isCollapsed">Mobiliario</span>
      </a>

      <!-- Configuración -->
      <a
        routerLink="/admin/configuracion"
        routerLinkActive="bg-slate-700 text-white shadow"
        class="flex items-center rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all duration-200"
        [ngClass]="isCollapsed ? 'justify-center p-3' : 'gap-3 px-4 py-3'"
      >
        <i class="fa-solid fa-gear text-lg"></i>
        <span *ngIf="!isCollapsed">Configuración</span>
      </a>

    </nav>

    <!-- CERRAR SESIÓN -->
    <div class="pt-6 border-t border-slate-700">

      <div
        (click)="logout()"
        class="flex items-center gap-3 text-orange-400 hover:text-orange-500 cursor-pointer px-4 py-3 transition"
        [ngClass]="isCollapsed ? 'justify-center' : ''"
      >

        <i class="fa-solid fa-right-from-bracket"></i>

        <span *ngIf="!isCollapsed">
          Cerrar sesión
        </span>

      </div>

    </div>

  </aside>

  <!-- CONTENIDO -->
  <main class="flex-1 p-8 overflow-y-auto bg-white">

    <router-outlet></router-outlet>

  </main>

</div>
