<div 
  class="min-h-screen flex items-center justify-center relative bg-cover bg-center bg-no-repeat"
  style="
    background-image: url('assets/img/fondohotel.jpg');
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
  "
>

  <!-- Capa oscura -->
  <div class="absolute inset-0 bg-black bg-opacity-50"></div>

  <!-- Contenedor -->
  <div class="relative w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img 
        src="assets/img/Logoposada.png" 
        alt="Hotel Posada de Tampico"
        class="h-20 object-contain"
      >
    </div>

    <!-- Título -->
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-gray-800">
        Bienvenido
      </h2>
      <p class="text-gray-500 text-sm mt-1">
        Accede a tu cuenta
      </p>
    </div>

    <!-- Formulario -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Correo electrónico
        </label>
        <input 
          type="email"
          formControlName="email"
          placeholder="ejemplo@correo.com"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-400 focus:border-orange-400 focus:outline-none transition"
        >
      </div>

      <!-- Contraseña con ojito -->
      <div class="relative">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Contraseña
        </label>

        <input 
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="••••••••"
          class="w-full px-4 py-2.5 pr-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-400 focus:border-orange-400 focus:outline-none transition"
        >

        <!-- Botón ojito -->
        <button
          type="button"
          (click)="showPassword = !showPassword"
          class="absolute right-3 top-[38px] text-gray-500 hover:text-orange-500 transition"
        >
          <i 
            class="fa-solid"
            [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'">
          </i>
        </button>
      </div>

      <!-- Botón -->
      <button 
        type="submit"
        [disabled]="loading || loginForm.invalid"
        class="w-full py-2.5 bg-orange-500 text-white font-semibold rounded-lg shadow-md hover:bg-orange-600 transition disabled:bg-gray-400 disabled:cursor-not-allowed"
      >
        {{ loading ? 'Ingresando...' : 'Iniciar Sesión' }}
      </button>

      <!-- Error -->
      <div *ngIf="errorMessage" class="text-center text-sm text-red-500">
        {{ errorMessage }}
      </div>

    </form>

  </div>

</div>
